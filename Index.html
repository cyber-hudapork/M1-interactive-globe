document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

fae4ad0c7\"><\u002Fscript>\n<script>\n// ─── Config ───────────────────────────────────────────────────────────────────\nconst SIZE     = Math.min(window.innerWidth, window.innerHeight, 620);\nconst W = SIZE, H = SIZE;\nconst BASE_SCALE  = SIZE * 0.43;\nconst SPACING  = Math.max(4, Math.round(SIZE / 120));\nconst R_LAND   = SPACING * 0.265;\nconst R_OCEAN  = SPACING * 0.10;\nconst C_LAND   = '#e2dfd9';\nconst C_OCEAN  = '#242424';\nconst C_BG     = '#0d0d0d';\nconst MIN_SCALE = BASE_SCALE * 0.35;\nconst MAX_SCALE = (W / 2) * 0.97;  // never exceed canvas bounds\n\nconst MARKERS = [\n  { id: 'usa', name: 'USA',       coords: [-100,   38]   },\n  { id: 'ca',  name: 'CANADA',    coords: [ -106,  56]   },\n  { id: 'fr',  name: 'FRANCE',    coords: [   2.3, 46.8] },\n  { id: 'uae', name: 'UAE',       coords: [  54,   24]   },\n  { id: 'id',  name: 'INDONESIA', coords: [ 118,   -2]   },\n  { id: 'jp',  name: 'JAPAN',     coords: [ 138,   36]   },\n  { id: 'au',  name: 'AUSTRALIA', coords: [ 134,  -27]   },\n];\n\n// ─── Setup ────────────────────────────────────────────────────────────────────\nconst canvas = document.getElementById('globe');\ncanvas.width  = W; canvas.height = H;\nconst ctx = canvas.getContext('2d');\n\nconst oCanvas = document.createElement('canvas');\noCanvas.width = W; oCanvas.height = H;\nconst oCtx = oCanvas.getContext('2d');\n\nlet currentScale = BASE_SCALE;\nlet targetScale  = BASE_SCALE;\n\nconst projection = d3.geoOrthographic()\n  .scale(currentScale)\n  .translate([W/2, H/2])\n  .clipAngle(90);\n\nlet land = null;\nlet rotLon = 15, rotLat = -25;\nlet tick = 0;\n\n// Drag + inertia state\nlet isDragging = false;\nlet lastX = 0, lastY = 0;\nlet autoRotate = true;\nlet idleTimer = null;\n\n// Label DOM nodes\nconst labelEls = {};\nMARKERS.forEach(m => {\n  const el = document.createElement('div');\n  el.className = 'label';\n  el.textContent = m.name;\n  document.getElementById('wrap').appendChild(el);\n  labelEls[m.id] = el;\n});\n\n// ─── Render ───────────────────────────────────────────────────────────────────\nfunction render() {\n  tick++;\n\n  // Smooth zoom interpolation\n  currentScale += (targetScale - currentScale) * 0.12;\n  projection.scale(currentScale);\n  projection.rotate([rotLon, rotLat, 0]);\n\n  // Land → offscreen\n  const oPath = d3.geoPath(projection, oCtx);\n  oCtx.clearRect(0, 0, W, H);\n  oCtx.fillStyle = '#fff';\n  oCtx.beginPath(); oPath(land); oCtx.fill();\n  const imgData = oCtx.getImageData(0, 0, W, H).data;\n\n  function isLand(x, y) {\n    const xi = x | 0, yi = y | 0;\n    if (xi < 0 || xi >= W || yi < 0 || yi >= H) return false;\n    return imgData[(yi * W + xi) * 4] > 128;\n  }\n\n  // Clear + globe fill\n  ctx.clearRect(0, 0, W, H);\n  ctx.beginPath();\n  ctx.arc(W/2, H/2, currentScale, 0, Math.PI*2);\n  ctx.fillStyle = C_BG;\n  ctx.fill();\n\n  // Atmosphere limb\n  const limbGrad = ctx.createRadialGradient(W/2, H/2, currentScale * 0.88, W/2, H/2, currentScale);\n  limbGrad.addColorStop(0, 'rgba(200,200,200,0)');\n  limbGrad.addColorStop(1, 'rgba(180,180,180,0.04)');\n  ctx.beginPath();\n  ctx.arc(W/2, H/2, currentScale, 0, Math.PI*2);\n  ctx.fillStyle = limbGrad; ctx.fill();\n\n  // Dot matrix\n  const r2 = currentScale * currentScale;\n  const cx = W/2, cy = H/2;\n\n  for (let x = SPACING/2; x < W; x += SPACING) {\n    for (let y = SPACING/2; y < H; y += SPACING) {\n      const dx = x - cx, dy = y - cy;\n      if (dx*dx + dy*dy > r2) continue;\n      const onLand = isLand(x, y);\n      ctx.beginPath();\n      ctx.arc(x, y, onLand ? R_LAND : R_OCEAN, 0, Math.PI*2);\n      ctx.fillStyle = onLand ? C_LAND : C_OCEAN;\n      ctx.fill();\n    }\n  }\n\n  // Clip to sphere\n  ctx.save();\n  ctx.globalCompositeOperation = 'destination-in';\n  ctx.beginPath(); ctx.arc(W/2, H/2, currentScale, 0, Math.PI*2); ctx.fill();\n  ctx.restore();\n\n  // ─── Travel routes from Indonesia ───────────────────────────────────────────\n  drawRoutes();\n\n  // Markers\n  const visCenter = projection.invert([W/2, H/2]);\n\n  MARKERS.forEach(m => {\n    const lbl = labelEls[m.id];\n    const dist = d3.geoDistance(m.coords, visCenter);\n    const visible = dist < Math.PI / 2 - 0.05;\n\n    if (!visible) { lbl.style.opacity = '0'; return; }\n\n    const [px, py] = projection(m.coords);\n    const edgeDist = Math.sqrt((px - W/2)**2 + (py - H/2)**2) / currentScale;\n    const alpha = Math.max(0, 1 - Math.pow(edgeDist, 3) * 1.5);\n\n    // Pulse: two independent oscillators for organic feel\n    const pulse  = 0.5 + 0.5 * Math.sin(tick * 0.05 + m.coords[0] * 0.1);\n    const pulse2 = 0.5 + 0.5 * Math.sin(tick * 0.03 + m.coords[0] * 0.1 + 1.2);\n\n    ctx.save();\n    ctx.globalAlpha = alpha;\n\n    // Soft glow blob — bigger AOE\n    const gR = 36 + pulse * 18;\n    const glow = ctx.createRadialGradient(px, py, 0, px, py, gR);\n    glow.addColorStop(0,   `rgba(255,110,20,${0.45 + pulse * 0.25})`);\n    glow.addColorStop(0.4, `rgba(255, 90,15,${0.18})`);\n    glow.addColorStop(1,   'rgba(255,60,0,0)');\n    ctx.beginPath(); ctx.arc(px, py, gR, 0, Math.PI*2);\n    ctx.fillStyle = glow; ctx.fill();\n\n    // Outer expanding pulse ring — wider AOE, fades as it grows\n    const ringR = 12 + pulse2 * 22;\n    ctx.beginPath(); ctx.arc(px, py, ringR, 0, Math.PI*2);\n    ctx.strokeStyle = `rgba(255,130,40,${0.65 * (1 - pulse2 * 0.85)})`;\n    ctx.lineWidth = 1.6; ctx.stroke();\n\n    // Second offset pulse ring — staggered phase for layered effect\n    const pulse3 = (pulse2 + 0.5) % 1;\n    const ringR2 = 12 + pulse3 * 22;\n    ctx.beginPath(); ctx.arc(px, py, ringR2, 0, Math.PI*2);\n    ctx.strokeStyle = `rgba(255,130,40,${0.4 * (1 - pulse3 * 0.85)})`;\n    ctx.lineWidth = 1.2; ctx.stroke();\n\n    // Inner ring (steady)\n    ctx.beginPath(); ctx.arc(px, py, 6.5, 0, Math.PI*2);\n    ctx.strokeStyle = 'rgba(255,150,60,0.9)';\n    ctx.lineWidth = 1.5; ctx.stroke();\n\n    // Center dot — pulses in size\n    const dotR = 2.6 + pulse * 1.3;\n    ctx.beginPath(); ctx.arc(px, py, dotR, 0, Math.PI*2);\n    ctx.fillStyle = '#ff7820'; ctx.fill();\n\n    // Bright core\n    ctx.beginPath(); ctx.arc(px, py, 1.4, 0, Math.PI*2);\n    ctx.fillStyle = '#ffcc88'; ctx.fill();\n\n    ctx.restore();\n\n    // Label anchored directly to the RIGHT of the dot, vertically aligned\n    lbl.style.opacity = alpha.toFixed(2);\n    lbl.style.left    = (px + 14) + 'px';   // fixed gap to the right of marker\n    lbl.style.top     = py + 'px';\n  });\n\n  // Globe outline\n  ctx.beginPath(); ctx.arc(W/2, H/2, currentScale, 0, Math.PI*2);\n  ctx.strokeStyle = 'rgba(255,255,255,0.06)'; ctx.lineWidth = 1; ctx.stroke();\n}\n\n// ─── Network routes ───────────────────────────────────────────────────────────\nconst ORIGIN_ID = 'id';\nconst RC = [255, 120, 32]; // orange — matches marker color\n\nconst ROUTES = MARKERS.filter(m => m.id !== ORIGIN_ID).map((m, i, arr) => ({\n  target: m,\n  packetOffset: i / arr.length,  // stagger packets\n}));\n\nfunction sampleGreatCircle(a, b, steps) {\n  const interp = d3.geoInterpolate(a, b);\n  return Array.from({ length: steps + 1 }, (_, i) => interp(i / steps));\n}\n\nfunction drawRoutes() {\n  const origin = MARKERS.find(m => m.id === ORIGIN_ID);\n  const vc = projection.invert([W/2, H/2]);\n  const STEPS = 100;\n  const PACKET_SPEED = 0.0018;\n  const PACKET_COUNT = 2; // multiple packets per line\n\n  ctx.save();\n  ctx.beginPath();\n  ctx.arc(W/2, H/2, currentScale - 1, 0, Math.PI*2);\n  ctx.clip();\n\n  ROUTES.forEach((route) => {\n    const dest = route.target;\n    const pts = sampleGreatCircle(origin.coords, dest.coords, STEPS);\n\n    const screenPts = pts.map(p => {\n      const d = d3.geoDistance(p, vc);\n      const visible = d < Math.PI / 2 - 0.01;\n      return { proj: visible ? projection(p) : null, visible };\n    });\n\n    // ── 1. Persistent base line (full arc, dotted/dashed, very subtle) ──────\n    for (let i = 0; i < screenPts.length - 1; i++) {\n      const a = screenPts[i], b = screenPts[i + 1];\n      if (!a.visible || !b.visible) continue;\n      // dashed: skip every other pair for a \"- - -\" feel\n      if (Math.floor(i / 2) % 2 === 1) continue;\n      ctx.beginPath();\n      ctx.moveTo(a.proj[0], a.proj[1]);\n      ctx.lineTo(b.proj[0], b.proj[1]);\n      ctx.strokeStyle = `rgba(${RC.join(',')},0.18)`;\n      ctx.lineWidth = 1;\n      ctx.stroke();\n    }\n\n    // ── 2. Animated packets (bright dots sliding along arc) ──────────────────\n    for (let p = 0; p < PACKET_COUNT; p++) {\n      const phase = (tick * PACKET_SPEED + route.packetOffset + p / PACKET_COUNT) % 1;\n      const trailLen = 0.10; // fraction of arc for tail\n\n      for (let i = 0; i < screenPts.length - 1; i++) {\n        const a = screenPts[i], b = screenPts[i + 1];\n        if (!a.visible || !b.visible) continue;\n\n        const t = (i + 0.5) / STEPS;\n        // dt: how far behind the packet head this segment is\n        const dt = (phase - t + 1) % 1;\n        if (dt > trailLen) continue;\n\n        const trailAlpha = 1 - dt / trailLen; // bright at head → fades\n\n        // Glow stroke\n        ctx.beginPath();\n        ctx.moveTo(a.proj[0], a.proj[1]);\n        ctx.lineTo(b.proj[0], b.proj[1]);\n        ctx.strokeStyle = `rgba(${RC.join(',')},${trailAlpha * 0.25})`;\n        ctx.lineWidth = 5;\n        ctx.stroke();\n\n        // Core stroke\n        ctx.beginPath();\n        ctx.moveTo(a.proj[0], a.proj[1]);\n        ctx.lineTo(b.proj[0], b.proj[1]);\n        ctx.strokeStyle = `rgba(${RC.join(',')},${trailAlpha * 0.9})`;\n        ctx.lineWidth = 1.6;\n        ctx.stroke();\n      }\n\n      // Leading dot\n      const headIdx = Math.min(Math.round(phase * STEPS), STEPS - 1);\n      const hp = screenPts[headIdx];\n      if (hp && hp.visible && hp.proj) {\n        const [hx, hy] = hp.proj;\n        // Outer glow\n        const hg = ctx.createRadialGradient(hx, hy, 0, hx, hy, 8);\n        hg.addColorStop(0,   `rgba(${RC.join(',')},0.8)`);\n        hg.addColorStop(0.5, `rgba(${RC.join(',')},0.2)`);\n        hg.addColorStop(1,   `rgba(${RC.join(',')},0)`);\n        ctx.beginPath(); ctx.arc(hx, hy, 8, 0, Math.PI*2);\n        ctx.fillStyle = hg; ctx.fill();\n        // Core dot\n        ctx.beginPath(); ctx.arc(hx, hy, 2.2, 0, Math.PI*2);\n        ctx.fillStyle = `rgba(255,210,160,1)`; ctx.fill();\n      }\n    }\n  });\n\n  ctx.restore();\n}\n\n// ─── Animation loop ───────────────────────────────────────────────────────────\nfunction loop() {\n  if (!isDragging && autoRotate) rotLon += 0.08;\n  render();\n  requestAnimationFrame(loop);\n}\n\n// ─── Drag ─────────────────────────────────────────────────────────────────────\nfunction startDrag(x, y) {\n  isDragging = true;\n  autoRotate = false;\n  lastX = x; lastY = y;\n  clearTimeout(idleTimer);\n}\n\nfunction moveDrag(x, y) {\n  if (!isDragging) return;\n  const dx = x - lastX, dy = y - lastY;\n  const sens = (BASE_SCALE / currentScale) * 0.35;\n  rotLon += dx * sens;\n  rotLat -= dy * sens;\n  rotLat  = Math.max(-85, Math.min(85, rotLat));\n  lastX = x; lastY = y;\n}\n\nfunction endDrag() {\n  isDragging = false;\n  idleTimer = setTimeout(() => { autoRotate = true; }, 3000);\n}\n\ncanvas.addEventListener('mousedown',  e => startDrag(e.clientX, e.clientY));\nwindow.addEventListener('mousemove',  e => moveDrag(e.clientX, e.clientY));\nwindow.addEventListener('mouseup',    endDrag);\ncanvas.addEventListener('touchstart', e => { e.preventDefault(); startDrag(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });\ncanvas.addEventListener('touchmove',  e => { e.preventDefault(); moveDrag(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });\ncanvas.addEventListener('touchend',   endDrag);\n\n// ─── Zoom (mouse wheel) ───────────────────────────────────────────────────────\ncanvas.addEventListener('wheel', e => {\n  e.preventDefault();\n  const factor = e.deltaY < 0 ? 1.08 : 0.926;\n  targetScale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, targetScale * factor));\n}, { passive: false });\n\n// Pinch-to-zoom (touch)\nlet lastPinchDist = null;\ncanvas.addEventListener('touchstart', e => {\n  if (e.touches.length === 2) lastPinchDist = null;\n}, { passive: false });\ncanvas.addEventListener('touchmove', e => {\n  if (e.touches.length !== 2) return;\n  e.preventDefault();\n  const dx = e.touches[0].clientX - e.touches[1].clientX;\n  const dy = e.touches[0].clientY - e.touches[1].clientY;\n  const dist = Math.sqrt(dx*dx + dy*dy);\n  if (lastPinchDist !== null) {\n    const factor = dist / lastPinchDist;\n    targetScale = Math.max(MIN_SCALE, Math.min(MAX_SCALE, targetScale * factor));\n  }\n  lastPinchDist = dist;\n}, { passive: false });\n\n// ─── Load data & start ────────────────────────────────────────────────────────\nfetch(window.__resources.worldAtlas)\n  .then(r => r.json())\n  .then(world => {\n    land = topojson.feature(world, world.objects.land);\n    loop();\n  })\n  .catch(() => {\n    document.body.innerHTML = '<p style=\"color:#888;font-family:monospace;padding:2rem\">Failed to load geographic data. Please check your connection.<\u002Fp>';\n  });\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
